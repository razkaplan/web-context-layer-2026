const md = `The most interesting shift happening inside AI engineering right now is not about model size, fine-tuning, or inference speed. It is about ontology. A growing cohort of engineers has stopped asking "how do we give agents more data?" and started asking something more fundamental: "what does an agent actually need to know about the world?"

Their answer is rewriting a category.

## Two Pieces of Paper

Consider two pieces of paper. The first is a page from a phonebook. It tells you that Pat Grady is co-steward at Sequoia Capital. Phone number. Email. Address. That is data.

The second is a page from a well-maintained Rolodex with handwritten side notes. It tells you that Pat Grady is co-steward at Sequoia, that he led every round of Harvey AI from a $150M Series A to an $11B valuation, that he also sits on the cap table of Orbital Insight and 6sense, that he published a reflection on AI infrastructure investing three weeks ago, that he tends to respond to cold outreach on Tuesday mornings, and that the last time you were in the same room he was asking pointed questions about data provenance in legal AI. That is context.

Both pieces of paper contain "information." Only one of them makes an agent useful.

This is the philosophical foundation of a category that is forming in plain sight. Call it Context-as-a-Service. The companies building it are not selling phonebooks. They are building Rolodexes — structured, relational, annotated records of how entities in the world relate to each other — with one additional requirement that makes the whole thing significantly harder: the notes have to be alive.

## The Live Validation Requirement

That coffee shop around the corner from the hotel? It matters that it is five minutes away. It also matters that it is open right now, that it started accepting reservations last month, and that its espresso machine has been broken since Tuesday. A recommendation grounded in stale context is not just less useful — in the wrong domain, it is actively harmful.

This is why the engineers working on context infrastructure have converged on a principle that sounds obvious but is architecturally demanding: relational knowledge is not a snapshot. It is a stream. Every node in the graph has a freshness requirement. Some relationships update annually (a career move). Some update daily (a job posting surge). Some need to be validated at the moment of use (is the API returning data right now, or is the source blocking access?).

The data companies that understood this early are the ones pulling away. The ones that did not are becoming ZoomInfo: a $25 billion company that became a $1.8 billion company in four years because it sold a phonebook in a world that had decided it wanted the Rolodex.

## The Escalation Problem

Here is what makes the ontological approach interesting beyond sales and marketing, where most of the early investment has gone.

In sales, better context means better outreach. A rep who knows that a prospect's champion just got promoted, that three of the prospect's engineers starred their GitHub repo last week, and that the company posted a DevOps role yesterday closes faster. That is a meaningful improvement. It is not a civilization-scale one.

Move one step up the value chain to private equity and the stakes get sharper. The deal signal in PE is almost never in the data. It is in the relationship changes. A CFO starts networking visibly on LinkedIn. Three product engineers leave in sixty days. A founder shifts their conference framing from "enterprise" to "infrastructure." None of these are numbers in a spreadsheet. They are relational events — nodes changing state in the graph — and an agent that can read them in real time and chain them together sees a deal emerging weeks before any memo reaches an investment committee. That is not a nice-to-have. That is alpha.

But health and science is where the chain-of-thought implications become genuinely difficult to bound.

A drug database can tell you that Compound X is approved for Condition Y. A context layer can tell you that Compound X treats Condition Y via Mechanism Z, but that patients with Biomarker A show forty percent reduced efficacy, that a 2024 paper identified a possible mediating role for Protein Q (characterized only last year), that three clinical trials are currently enrolling patients with exactly the population profile you care about, and that the lead investigator on two of those trials was an author on the original mechanism paper. That is a chain of thought an agent can reason over. The output of that reasoning chain is potentially a better clinical decision. In some cases, the difference between the phonebook and the Rolodex is the difference between a treatment that works and one that does not.

The same logic applies to protein folding, materials science, regulatory genealogy, legal precedent. The more complex and interconnected the domain, the more the quality of the context layer determines the quality of the reasoning output. The model matters less than you think. The context layer matters more. On knowledge-intensive tasks, a model receiving accurate grounded context consistently outperforms a stronger model without it — because the problem is not reasoning capability. The problem is that models cannot know what they do not have access to.

## The Founder Signal

Investors asking "which AI companies should I look at?" are often asking the wrong question. The better question is: which founders are thinking about entity relationships, not entity records?

There is a tell. Context-first founders talk about what they call "the gap between what the model thinks it knows and what is actually true right now." They build freshness SLAs into their product architecture before they build dashboards. They distinguish between a fact (the company raised $40M) and a relationship (the company raised $40M from a fund whose partner previously backed two companies that competed with this one, which is relevant context for the next round conversation). They worry about what happens when an upstream source starts blocking access, because they know their entire value proposition lives or dies on the reliability of the live data layer underneath.

That last point is the one that most early-stage context companies have not solved. Building the Rolodex is hard. Keeping it alive is the real product.

The web access infrastructure layer — managing anti-bot systems, maintaining source coverage, validating freshness at production scale — is the invisible prerequisite for every company on the map below.

Palantir has been building ontology infrastructure for fifteen years and represents the most mature version of this philosophy at enterprise scale. The reason it requires significant operational resources to deploy is the consumption layer it was built for: human analysts querying knowledge graphs at deliberate pace. The agent model changes that equation. Agents query context programmatically, at high volume, continuously — the consumption velocity shifts the unit economics, eliminates the analyst layer, and raises a different hard problem. Not building the knowledge graph. Keeping it live at agent-query speed. MCP standardizes the consumption interface. Commoditized vector databases and graph engines remove the prior infrastructure bottleneck. What remains is the data acquisition and freshness problem — which is what no language model can solve on its own, and what the best companies on this map have built.

## The Market Doing the Math

The financial case has followed the philosophical case, not led it. IDC's Directions 2026 research projects agentic AI will exceed $1.3 trillion in global spending by 2029, more than 26% of worldwide IT budgets (IDC, March 2026). Gartner confirms the adoption curve: less than 5% of enterprise applications feature AI agents today; 40% will by the end of 2026 (Gartner, August 2025). Every one of those agents needs a context layer to be useful.

The retrieval infrastructure underneath sits at $3.33 billion in 2026, compounding at roughly 49% CAGR toward $67 to $81 billion by 2034 (Precedence Research, 2025). Anthropic's Model Context Protocol, donated to the Linux Foundation in December 2025, hit 10,000 public servers and 97 million monthly SDK downloads by early 2026 — the protocol layer standardizing how agents consume context is already at infrastructure scale. Production benchmarks confirm the infrastructure demand is real: Bright Data, one of the largest web data collection platforms (disclosure: the author works there), crossed $300M ARR in 2025 at over 50% year-on-year growth powering 100 million daily AI agent interactions (CTech, 2026). That is not a Bright Data story. It is a context layer story.

Private multiples reflect the thesis. Clay remarked at $5B in a 2026 employee tender, roughly 50x ARR. Glean raised at $7.2B against $200M ARR, a 36x multiple, with explicit positioning as the "connective tissue between models and enterprise systems" (TechCrunch, February 2026). Harvey AI reached an $8B valuation building context infrastructure for legal reasoning. The spread from 50x to 10x maps most cleanly onto one variable: how much of the moat survives a better model. Clay's proprietary data collection cannot be replicated by a prompt. Glean's enterprise graph accumulates depth with every connected system and every search. The companies at the high end are the ones whose competitive advantage does not erode when OpenAI ships a stronger base model.

The investors assembling the most intentional positions here are not waiting for a consensus view. Pat Grady at Sequoia led Harvey AI from a $150M Series A to an $11B valuation and holds positions in Orbital Insight and 6sense — three companies in three different context verticals, the same underlying bet expressed three times. Caroline Xie at ICONIQ Growth built overlapping stakes in Relativity, Komodo Health, Benchling, and People.ai before most allocators had a name for the category. Tiger Global holds positions in Komodo Health, Klue, RelationalAI, and Benchling. These are not thematic bets on "AI." They are precise bets on the context layer, placed by people who recognized the philosophical shift before the financial case was obvious.

Strategic buyers see the same thing. Salesforce paid $8 billion for Informatica, framing it as "the data foundation for agentic AI." ServiceNow paid $500 million for data.world to give agents "the context to drive smarter outcomes." $8.5 billion in a single year on the same underlying bet.

On the bear case: context windows are expanding fast, but a 1M-token query runs 30 to 60x slower than a RAG pipeline at roughly 1,250x the per-query cost, and hybrid retrieval-plus-long-context wins 7 of 8 enterprise use cases in head-to-head testing (LaRA benchmark, OpenReview 2026). Bigger context windows do not replace the context layer. They increase its value, because more context can be injected into a larger window. And Gartner's prediction that 40% of agentic AI projects will be cancelled by end of 2027 is not a headwind for this category. It is the reason the category exists: the cancelled projects are the ones that shipped without grounded context.

## The Layer Beneath the Rolodex

Before mapping the context companies, one structural point matters for investors.

The companies below build and sell the Rolodex. They own the domain curation, the entity model, the freshness contracts. But underneath every one of them is a substrate they build on: vector databases that store and retrieve embeddings at production scale (Pinecone, Weaviate, Qdrant), knowledge graph engines that store and traverse entity relationships (Neo4j, TigerGraph), entity resolution platforms that decide whether two records refer to the same real-world object (Senzing, Diffbot), and structured intelligence extractors that convert raw signals into typed entities (Accrete).

These are different investments. Different buyer (engineer, not enterprise), different GTM, different competitive dynamics. But they are investable on the same thesis: every company building a Rolodex needs a filing system, a relationship engine, and a way to resolve whether two records pointing to the same person are actually the same person. The infrastructure layer has its own moats, and in some cases they are more durable than the application layer above them.

The 42 companies below are the application layer. The infrastructure beneath them is the reason the application layer exists.

Two commercial archetypes run through this map and are worth distinguishing before reading it. The first sells context as a product: structured relational data licensed to AI teams and agent pipelines. Komodo Health, Bombora, and Enigma sell the Rolodex directly. The second builds proprietary context as the moat powering a vertical AI application. Harvey AI, EvenUp, and Atropos Health use context to deliver a downstream outcome — legal reasoning, case valuation, real-world evidence studies — and charge for the outcome, not the context directly. Different exit profiles, different competitive dynamics, different churn curves. Both derive their defensibility from the same source: a context layer that cannot be replicated without building the same data infrastructure from scratch.

## What to Look For

The founders building the most defensible context businesses share a specific disposition. They are not building richer databases. They are building knowledge systems with explicit freshness contracts, entity resolution layers, and provenance chains. They can tell you not just what their product knows, but when it was last validated, where it came from, and what happens when the source becomes unavailable.

That last question is the one that separates the Rolodex builders from the phonebook sellers. A phonebook does not need to know where its data came from. A Rolodex with live side notes absolutely does. The quality of the context is only as good as the reliability of the access layer underneath — the infrastructure that fetches, validates, and refreshes the world's knowledge on the schedule that agents require.

The investors who find this category early will not find it by reading market reports. They will find it by talking to an engineer who stopped being interested in the model and started being interested in what the model thinks it knows — and whether that is actually true, right now.
