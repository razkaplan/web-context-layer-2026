<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The State of the DaaS Industry 2026: The Rise of Context as a Service | Bright Data</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#E8EDF5;--ink-mid:#C6DBFF;--ink-soft:#94A3B8;
  --blue:#3D7FFC;--blue-l:#5590FC;--blue-bg:#0D2243;
  --teal:#76A5FF;--green:#76A5FF;
  --paper:#091B36;--paper-2:#0D2243;--paper-3:#0B1C36;
  --border:rgba(118,165,255,0.15);--border-s:rgba(118,165,255,0.25);
  --muted:#8BA3C7;--muted-2:#5A7494;
  --bg-accent:#060E1E;
  --sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --lg:0 10px 30px rgba(0,0,0,.10),0 4px 8px rgba(0,0,0,.05);
}
html{scroll-behavior:smooth}
body{font-family:'Gibson','Inter',-apple-system,sans-serif;background:var(--paper);color:var(--ink);font-size:15px;line-height:1.6;letter-spacing:0.01em}

/* PRINT */
@media print{
  .progress-bar,.sticky-nav,.action-btn,.close-btn,.seg-detail .close-btn{display:none!important}
  body{font-size:10pt;line-height:1.4}
  .wrap{max-width:100%;padding:0 12mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  @page{size:A4 portrait;margin:12mm 0}
  section{padding:20pt 0 0}
  .divider{margin:20pt 0}
  #landscape{page-break-before:always}
  #infra{page-break-before:always}
  .mmap{grid-template-columns:repeat(3,1fr)!important}
  .mmap-outer{overflow:visible!important}
  .vc-mini-grid{grid-template-columns:repeat(3,1fr)!important}
  .stat-card,.kpi,.fail-card,.vc-mini-card{break-inside:avoid}
  .hdr{padding:32pt 0 24pt}
  .hdr h1{font-size:32pt}
  .layer-diag{break-inside:avoid}
  .closing{break-before:page}
  .src-grid{grid-template-columns:1fr}
}

/* PROGRESS */
.progress-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--blue-l));z-index:300;transition:width .08s linear;pointer-events:none}

/* STICKY NAV */
.sticky-nav{position:sticky;top:0;z-index:200;background:rgba(9,27,54,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:48px}
.snav-links{display:flex;gap:0;align-items:center}
.snav-link{font-size:12.5px;font-weight:500;color:var(--muted);padding:0 16px;height:48px;display:flex;align-items:center;border-bottom:2px solid transparent;text-decoration:none;transition:color .15s,border-color .15s;white-space:nowrap}
.snav-link:hover{color:var(--ink);text-decoration:none}
.snav-link.active{color:var(--blue);border-bottom-color:var(--blue)}
.snav-logo{display:flex;align-items:center;gap:8px}
.snav-logo img{height:22px;object-fit:contain}

/* ACTION BUTTONS */
.action-bar{display:flex;gap:8px;align-items:center}
.action-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:6px 13px;border-radius:7px;cursor:pointer;border:1px solid rgba(61,127,252,.3);background:transparent;color:var(--blue-l);transition:all .15s;text-decoration:none;letter-spacing:.01em}
.action-btn:hover{border-color:var(--blue);color:#fff;text-decoration:none}
.action-btn-primary{background:var(--blue);color:#fff!important;border-color:transparent!important}
.action-btn-primary:hover{opacity:.88}

/* WRAP */
.wrap{max-width:1100px;margin:0 auto;padding:0 40px}
.eyebrow{font-size:clamp(16px,1.2vw,18px);font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:#C6DBFF;margin-bottom:12px}
.h2{font-size:clamp(24px,3vw,38px);font-weight:800;letter-spacing:-.028em;line-height:1.1;color:var(--ink);margin-bottom:14px}
.h2 em{font-style:normal;color:var(--blue)}
.lead{font-size:16px;color:var(--muted);line-height:1.8;max-width:700px}
.divider{height:1px;background:var(--border);margin:72px 0}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
sup a{font-size:10px;color:var(--muted-2)}
section{padding:72px 0 0}

/* HEADER - editorial dark */
.hdr{background:var(--bg-accent);padding:88px 0 80px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:-150px;right:-80px;width:700px;height:700px;background:radial-gradient(circle,rgba(20,114,255,.14),transparent 65%);pointer-events:none}
.hdr::after{content:'';position:absolute;bottom:-80px;left:-80px;width:500px;height:500px;background:radial-gradient(circle,rgba(61,127,252,.06),transparent 65%);pointer-events:none}
.hdr-pill{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--blue-l);background:rgba(61,143,255,.12);border:1px solid rgba(61,143,255,.2);padding:6px 14px;border-radius:100px;margin-bottom:28px}
.hdr-dot{width:6px;height:6px;border-radius:50%;background:var(--blue-l);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hdr h1{font-size:clamp(44px,6vw,76px);font-weight:900;letter-spacing:-.04em;line-height:.97;color:#fff;max-width:820px;margin-bottom:24px}
.hdr h1 span{color:var(--blue-l)}
.hdr-sub{font-size:18px;color:#94A3B8;max-width:560px;line-height:1.7;margin-bottom:40px}
.hdr-meta{display:flex;gap:24px;flex-wrap:wrap;font-size:13px;color:#475569;padding-top:20px;border-top:1px solid rgba(255,255,255,.06)}
.hdr-meta b{color:#64748B}
.hdr-logo{margin-bottom:32px}
.hdr-logo img{height:32px;filter:brightness(0) invert(1);opacity:.9}

/* IMPACT STATS BAR (fal-inspired) */
.impact-bar{background:var(--paper-2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:36px 0;margin-top:0}
.impact-inner{display:grid;grid-template-columns:repeat(3,1fr);divide-x:1px solid var(--border);text-align:center}
.impact-item{padding:0 32px;border-right:1px solid var(--border)}
.impact-item:last-child{border-right:none}
.impact-n{font-size:clamp(32px,4vw,52px);font-weight:900;letter-spacing:-.04em;line-height:1;color:var(--ink);margin-bottom:8px}
.impact-n em{font-style:normal;color:var(--blue)}
.impact-lbl{font-size:13px;color:var(--muted);line-height:1.4;max-width:220px;margin:0 auto}
.impact-src{font-size:10.5px;color:var(--muted-2);margin-top:5px}

/* SHIFT */
.shift-grid{display:grid;grid-template-columns:1fr 52px 1fr;gap:0;align-items:center;margin-top:48px}
.shift-card{border-radius:16px;padding:36px 32px;border:1px solid var(--border);box-shadow:var(--sm)}
.shift-old{background:var(--paper-3)}
.shift-new{background:var(--paper-2);border-color:rgba(61,127,252,.3)}
.s-pill{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 11px;border-radius:100px;display:inline-block;margin-bottom:20px}
.s-pill-o{background:var(--paper-3);color:var(--muted)}
.s-pill-n{background:rgba(61,143,255,.15);color:var(--blue-l)}
.sh3{font-size:18px;font-weight:700;letter-spacing:-.015em;color:var(--ink);margin-bottom:10px}
.shift-new .sh3{color:#fff}
.s-list{list-style:none;display:flex;flex-direction:column;gap:11px}
.s-list li{font-size:13.5px;color:var(--muted);display:flex;align-items:flex-start;gap:10px;line-height:1.45}
.shift-new .s-list li{color:#94A3B8}
.blt{flex-shrink:0;color:var(--muted-2);font-size:15px;line-height:1;margin-top:1px}
.shift-new .blt{color:var(--blue-l)}
.shift-arr{display:flex;align-items:center;justify-content:center;color:var(--blue)}

/* CAGR CHART */
.cagr-wrap{margin-top:48px;background:var(--paper);border:1px solid var(--border);border-radius:16px;padding:32px 36px;box-shadow:var(--sm)}
.cagr-title{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.cagr-note{font-size:11.5px;color:var(--muted-2);margin-bottom:22px;line-height:1.5}
.cagr-row{display:grid;grid-template-columns:200px 1fr 120px;gap:14px;align-items:center;margin-bottom:12px}
.cagr-row:last-child{margin-bottom:0}
.cagr-lbl{font-size:12.5px;color:var(--ink-soft);text-align:right;line-height:1.3}
.cagr-track{height:10px;background:var(--paper-3);border-radius:100px;overflow:hidden}
.cagr-fill{height:100%;border-radius:100px;background:linear-gradient(to right,var(--blue),var(--blue-l));width:0;transition:width 1.1s cubic-bezier(0.34,1.56,0.64,1)}
.cagr-meta{display:flex;align-items:center;gap:6px}
.cagr-val{font-size:13px;font-weight:700;color:var(--blue)}
.cagr-src-link{font-size:10px;color:var(--blue-l);font-weight:600}
.cagr-est{font-size:10px;font-weight:600;color:var(--muted-2);background:var(--paper-3);border:1px solid var(--border);padding:1px 6px;border-radius:4px}

/* ═══ MARKET MAP ════════════════════════════════════════════ */
.map-section-header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:0}
.map-actions{display:flex;gap:8px;align-items:center;padding-bottom:4px}
.mmap-outer{margin-top:32px;overflow-x:auto;padding-bottom:4px}
.mmap{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;min-width:900px}
.mmap-col{background:var(--paper);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--sm);cursor:pointer;transition:border-color .15s,box-shadow .15s}
.mmap-col:hover{border-color:var(--border-s);box-shadow:var(--md)}
.mmap-col.sel{border-color:var(--blue);box-shadow:0 0 0 3px rgba(20,114,255,.1)}
.mmap-hdr{background:var(--paper-2);border-bottom:1px solid var(--border);padding:12px 12px 10px}
.mmap-seg{font-size:11.5px;font-weight:700;color:var(--ink);letter-spacing:-.01em;line-height:1.3;margin-bottom:8px}
.mmap-pills{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.mmap-sz{font-size:13px;font-weight:800;color:var(--ink);letter-spacing:-.02em}
.mmap-cagr{font-size:10px;font-weight:700;color:var(--blue-l);background:rgba(61,127,252,.08);border:1px solid rgba(61,127,252,.18);padding:2px 7px;border-radius:100px}
.mmap-est-badge{font-size:9px;font-weight:600;color:var(--muted-2);background:var(--paper-3);border:1px solid var(--border);padding:1px 5px;border-radius:4px}
.mmap-cos{padding:10px 8px;display:flex;flex-direction:column;gap:3px}
.mmap-co{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--ink-soft);padding:3px 5px;border-radius:4px;transition:background .1s;line-height:1.2}
.mmap-co:hover{background:rgba(61,127,252,.08)}
.mmap-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.mmap-co-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}

/* MAP LEGEND */
.map-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px}
.mmap-infra{margin-top:10px;background:linear-gradient(135deg,rgba(61,127,252,.1),rgba(61,127,252,.04));border:1px solid rgba(61,127,252,.25);border-radius:12px;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.mmap-infra-left{display:flex;align-items:center;gap:14px}
.mmap-infra-badge{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#fff;background:var(--blue);padding:4px 10px;border-radius:6px;white-space:nowrap}
.mmap-infra-title{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3}
.mmap-infra-desc{font-size:12px;color:var(--muted);line-height:1.4;margin-top:2px}
.mmap-infra-products{display:flex;gap:8px;flex-wrap:wrap}
.mmap-infra-pill{font-size:11px;font-weight:500;color:var(--blue-l);background:rgba(61,127,252,.08);border:1px solid rgba(61,127,252,.18);padding:4px 10px;border-radius:100px;white-space:nowrap}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* SEGMENT DETAIL */
.seg-detail{margin-top:20px;background:var(--paper);border:1px solid var(--blue);border-radius:14px;overflow:hidden;box-shadow:0 0 0 3px rgba(20,114,255,.08)}
.sd-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--paper-2);border-bottom:1px solid var(--border);gap:12px}
.sd-title{font-size:15px;font-weight:700;color:var(--ink)}
.sd-sub{font-size:12px;color:var(--muted);margin-top:2px}
.sd-badges{display:flex;gap:8px;align-items:center;flex-shrink:0}
.sd-mkt{font-size:18px;font-weight:800;color:var(--ink);letter-spacing:-.02em}
.sd-cagr{font-size:11px;font-weight:700;color:var(--blue-l);background:rgba(61,127,252,.08);border:1px solid rgba(61,127,252,.2);padding:3px 9px;border-radius:100px}
.sd-body{display:grid;grid-template-columns:1fr 1px 220px}
.sd-cos{padding:18px 20px}
.sd-inv{padding:18px 20px;background:var(--paper-2)}
.sd-sep{background:var(--border)}
.sd-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);margin-bottom:12px}
.sd-logos{display:flex;flex-wrap:wrap;gap:7px}
.co-chip{display:flex;align-items:center;gap:6px;background:var(--paper-2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:500;color:var(--ink-soft);box-shadow:none;transition:border-color .12s}
.co-chip:hover{border-color:var(--blue)}
.inv-list{display:flex;flex-direction:column;gap:8px}
.inv-row{display:flex;align-items:flex-start;gap:8px;font-size:11.5px;color:var(--ink-soft);line-height:1.35}
.inv-amt{font-weight:700;color:var(--blue)}
.close-btn{font-size:12px;font-weight:500;color:var(--blue-l);background:transparent;border:1px solid rgba(61,127,252,.3);padding:4px 10px;border-radius:6px;cursor:pointer;transition:background .1s;white-space:nowrap}
.close-btn:hover{background:rgba(61,127,252,.1)}

/* VC MINI GRID (below market map) */
.vc-mini-section{margin-top:36px}
.vc-mini-eyebrow{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted-2);margin-bottom:16px}
.vc-mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.vc-mini-card{background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:18px 20px;box-shadow:var(--sm);display:flex;flex-direction:column;gap:10px;transition:box-shadow .15s}
.vc-mini-card:hover{box-shadow:var(--md)}
.vc-mini-head{display:flex;align-items:center;gap:10px}
.vc-mini-name{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.vc-mini-focus{font-size:11px;color:var(--muted);margin-top:1px}
.vc-mini-deals{display:flex;flex-direction:column;gap:4px}
.vc-mini-deal{font-size:11px;color:var(--ink-soft);display:flex;align-items:baseline;gap:5px;line-height:1.3}
.vc-mini-co{font-weight:600;color:var(--ink);white-space:nowrap;font-size:11px}
.vc-mini-amt{font-size:10.5px;color:var(--blue);font-weight:600;white-space:nowrap}
.vc-mini-dot{width:3px;height:3px;border-radius:50%;background:var(--border-s);flex-shrink:0;margin-top:4px}

/* INFRA */
.infra-split{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;margin-top:48px}
.infra-body p{font-size:15px;color:var(--muted);line-height:1.8;margin-bottom:18px}
.infra-body p:last-child{margin-bottom:0}
.infra-body strong{color:var(--ink);font-weight:600}
.infra-kpis{display:flex;flex-direction:column;gap:14px}
.kpi{background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:20px 22px;box-shadow:var(--sm)}
.kpi-hot{background:var(--paper-2);border-color:rgba(61,127,252,.3)}
.kpi-n{font-size:32px;font-weight:900;letter-spacing:-.03em;line-height:1;color:var(--ink);margin-bottom:4px}
.kpi-hot .kpi-n{color:#fff}
.kpi-n em{font-style:normal;color:var(--blue)}
.kpi-d{font-size:12.5px;color:var(--muted);line-height:1.45}
.kpi-hot .kpi-d{color:#64748B}
.fail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:36px}
.fail-card{background:var(--paper-2);border:1px solid var(--border);border-radius:12px;padding:22px 20px}
.fail-n{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-bottom:10px}
.fail-t{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:8px}
.fail-d{font-size:13px;color:var(--muted);line-height:1.6}

/* BRIGHT DATA STACK SECTION */
.bd-stack-sec{background:var(--bg-accent);padding:80px 0;margin-top:56px;position:relative;overflow:hidden}
.bd-stack-sec::before{content:'';position:absolute;top:-100px;right:-100px;width:600px;height:600px;background:radial-gradient(circle,rgba(61,127,252,.08),transparent 65%);pointer-events:none}
.bd-stack-sec::after{content:'';position:absolute;bottom:-80px;left:-60px;width:400px;height:400px;background:radial-gradient(circle,rgba(61,127,252,.05),transparent 65%);pointer-events:none}
.bd-stack-head{text-align:center;margin-bottom:48px}
.bd-stack-head .eyebrow{color:#76A5FF}
.bd-stack-head .h2{color:#fff}
.bd-stack-head .h2 em{color:var(--blue-l)}
.bd-stack-sub{font-size:16px;color:#8BA3C7;max-width:640px;margin:16px auto 0;line-height:1.7;text-align:center}
.bd-flow{display:flex;align-items:center;justify-content:center;gap:0;max-width:900px;margin:0 auto 48px;position:relative}
.bd-flow-step{flex:1;text-align:center;padding:24px 16px;background:rgba(61,127,252,.04);border:1px solid rgba(61,127,252,.12);position:relative}
.bd-flow-step:first-child{border-radius:12px 0 0 12px}
.bd-flow-step:last-child{border-radius:0 12px 12px 0}
.bd-flow-step:not(:first-child){border-left:none}
.bd-flow-active{background:rgba(61,127,252,.12);border-color:rgba(61,127,252,.3)}
.bd-flow-n{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--blue-l);margin-bottom:8px}
.bd-flow-active .bd-flow-n{color:#fff}
.bd-flow-title{font-size:14px;font-weight:600;color:#C6DBFF;margin-bottom:4px}
.bd-flow-active .bd-flow-title{color:#fff}
.bd-flow-desc{font-size:11px;color:#5A7494;line-height:1.4}
.bd-flow-active .bd-flow-desc{color:#8BA3C7}
.bd-flow-arr{width:20px;height:20px;color:rgba(61,127,252,.4);flex-shrink:0;margin:0 -1px;z-index:1}
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.prod-card{background:rgba(255,255,255,.03);border:1px solid rgba(118,165,255,.12);border-radius:12px;padding:20px;transition:border-color .15s}
.prod-card:hover{border-color:rgba(61,127,252,.3)}
.prod-card:first-child{border-color:rgba(61,127,252,.3);background:rgba(61,127,252,.06)}
.prod-name{font-size:13px;font-weight:600;color:#E8EDF5;margin-bottom:8px}
.prod-desc{font-size:11.5px;color:#6B8AB5;line-height:1.55}
.cert-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:28px;justify-content:center}
.cert{font-size:11px;font-weight:500;color:#8BA3C7;background:rgba(255,255,255,.03);border:1px solid rgba(118,165,255,.12);padding:6px 14px;border-radius:8px;display:flex;align-items:center;gap:7px}
.cert-dot{width:6px;height:6px;border-radius:50%;background:var(--blue-l);flex-shrink:0}

/* CONTEXT LAYERS */
.ctx-stack{display:flex;flex-direction:column;gap:0;max-width:740px;margin:40px auto 0}
.ctx-layer{padding:22px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;border:1px solid var(--border);position:relative}
.ctx-layer:first-child{border-radius:14px 14px 3px 3px}
.ctx-layer:last-child{border-radius:3px 3px 14px 14px}
.ctx-layer:not(:first-child){border-top:none}
.ctx-l4{background:var(--paper-3)}
.ctx-l3{background:var(--paper-2)}
.ctx-l2{background:rgba(61,127,252,.06);border-color:rgba(61,127,252,.2)}
.ctx-l1{background:rgba(61,127,252,.12);border-color:rgba(61,127,252,.3)}
.ctx-name{font-size:14px;font-weight:600;color:var(--ink)}
.ctx-desc{font-size:12px;color:var(--muted);max-width:380px;line-height:1.5}
.ctx-tag{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);white-space:nowrap}
.ctx-bd-tag{color:var(--blue-l);background:rgba(61,127,252,.12);border:1px solid rgba(61,127,252,.25);padding:3px 9px;border-radius:100px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.ctx-evidence{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:36px}
.ctx-ev-card{background:var(--paper-2);border:1px solid var(--border);border-radius:12px;padding:20px}
.ctx-ev-n{font-size:28px;font-weight:900;color:var(--blue);letter-spacing:-.03em;line-height:1;margin-bottom:6px}
.ctx-ev-d{font-size:12px;color:var(--muted);line-height:1.5}

/* CONTEXT WINDOW TIMELINE */
.cw-timeline{display:flex;align-items:flex-end;gap:0;margin:40px 0 0;padding:0 0 16px;border-bottom:2px solid var(--border);position:relative}
.cw-bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative}
.cw-bar-fill{width:32px;border-radius:6px 6px 0 0;background:linear-gradient(to top,var(--blue),var(--blue-l));transition:height 1.2s cubic-bezier(0.34,1.56,0.64,1);min-height:4px}
.cw-bar-lbl{font-size:11px;font-weight:700;color:var(--blue-l);letter-spacing:-.01em}
.cw-bar-yr{font-size:10px;color:var(--muted-2);margin-top:2px}
.cw-bar-model{font-size:9px;color:var(--muted);white-space:nowrap;text-align:center;line-height:1.2}
.cw-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:36px}
.cw-kpi{background:var(--paper-2);border:1px solid var(--border);border-radius:12px;padding:20px 18px}
.cw-kpi-n{font-size:28px;font-weight:900;color:var(--ink);letter-spacing:-.03em;line-height:1;margin-bottom:6px}
.cw-kpi-n em{font-style:normal;color:var(--blue)}
.cw-kpi-d{font-size:12px;color:var(--muted);line-height:1.5}

/* CLOSING (editorial pull quote style) */
.closing{text-align:center;padding:100px 0;background:var(--bg-accent);position:relative;overflow:hidden}
.closing::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:1px;height:60px;background:linear-gradient(to bottom,transparent,rgba(61,143,255,.3))}
.closing-q{font-size:clamp(24px,3.5vw,42px);font-weight:700;letter-spacing:-.03em;line-height:1.2;color:#fff;max-width:700px;margin:0 auto 24px;font-style:italic}
.closing-q span{color:var(--blue-l);font-style:normal}
.closing-attr{font-size:13px;color:#475569;letter-spacing:.06em;text-transform:uppercase;margin-bottom:48px}
.cta-btn{display:inline-flex;align-items:center;gap:9px;background:var(--blue);color:#fff;font-size:14px;font-weight:700;padding:14px 28px;border-radius:9px;text-decoration:none;transition:opacity .2s}
.cta-btn:hover{opacity:.88;text-decoration:none}

/* SOURCES / FOOTER */
.sources-sec{background:var(--paper-2);border-top:1px solid var(--border);padding:48px 0}
.src-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 32px;margin-top:24px}
.src-item{font-size:11.5px;color:var(--muted);display:flex;gap:8px;line-height:1.45}
.src-num{color:var(--muted-2);flex-shrink:0;font-weight:600;min-width:22px}
.footer-inner{border-top:1px solid var(--border);padding:28px 40px;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted-2);max-width:1100px;margin:0 auto}

@media(max-width:960px){
  .shift-grid,.infra-split{grid-template-columns:1fr;gap:20px}
  .shift-arr{transform:rotate(90deg);margin:4px auto}
  .impact-inner{grid-template-columns:1fr}
  .impact-item{border-right:none;border-bottom:1px solid var(--border);padding:20px 0}
  .impact-item:last-child{border-bottom:none}
  .vc-mini-grid{grid-template-columns:1fr 1fr}
  .fail-grid,.prod-grid{grid-template-columns:1fr 1fr}
  .bd-flow{flex-wrap:wrap}
  .bd-flow-step{min-width:140px}
  .ctx-evidence{grid-template-columns:1fr 1fr}
  .cw-kpi-grid{grid-template-columns:1fr 1fr}
  .sd-body{grid-template-columns:1fr}
  .sd-sep{display:none}
  .sd-inv{border-top:1px solid var(--border)}
  .sticky-nav{padding:0 20px}
  .snav-links{gap:0}
  .snav-link{padding:0 10px;font-size:11.5px}
}
@media(max-width:640px){
  .wrap{padding:0 20px}
  .impact-inner,.vc-mini-grid,.fail-grid,.prod-grid,.src-grid,.ctx-evidence,.cw-kpi-grid{grid-template-columns:1fr}
  .cw-timeline{overflow-x:auto}
  .cagr-row{grid-template-columns:110px 1fr 90px}
  .sd-head{flex-direction:column;align-items:flex-start}
  .snav-links .snav-link:nth-child(n+4){display:none}
}

function CountUp({ to, decimals=0 }) {
  const [val, setVal] = useState(0);
  const [done, setDone] = useState(false);
  const ref = useRef();
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !done) {
        setDone(true);
        const t0 = performance.now(), dur = 1800;
        const tick = (now) => {
          const p = Math.min((now-t0)/dur,1), ease = 1-Math.pow(1-p,3);
          setVal(+(to*ease).toFixed(decimals));
          if (p<1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
        obs.disconnect();
      }
    }, {threshold:0.5});
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [done]);
  return <span ref={ref}>{val.toFixed(decimals)}</span>;
}

function CAGRBar({ seg, maxCagr, delay }) {
  const [w, setW] = useState(0);
  const ref = useRef();
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setTimeout(() => setW((seg.cagr/maxCagr)*100), delay); obs.disconnect(); }
    }, {threshold:0.2});
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} className="cagr-row">
      <div className="cagr-lbl">{seg.name.replace(' & GTM','').replace(' & PropTech','').replace(' Intel.','')}</div>
      <div className="cagr-track">
        <div className="cagr-fill" style={{width:`${w}%`,transition:`width 1.1s cubic-bezier(0.34,1.56,0.64,1) ${delay}ms`}} />
      </div>
      <div className="cagr-meta">
        <span className="cagr-val">{seg.cagr}%</span>
        {seg.cagrEst
          ? <span className="cagr-est">est.</span>
          : <a href={seg.cagrSourceUrl} target="_blank" className="cagr-src-link" title={seg.cagrNote}>src</a>
        }
      </div>
    </div>
  );
}

function ContextWindowSection() {
  const bars = [
    {yr:'Early 2023',size:'8K–32K',h:3,model:'GPT-4'},
    {yr:'Mid 2023',size:'100K',h:8,model:'Claude 2'},
    {yr:'Early 2024',size:'200K',h:16,model:'Claude 3'},
    {yr:'Mid 2024',size:'1M',h:60,model:'Gemini 1.5'},
    {yr:'Early 2025',size:'1M',h:60,model:'GPT-4.1'},
    {yr:'2025',size:'10M',h:85,model:'Llama 4 Scout'},
    {yr:'2026',size:'1M GA',h:60,model:'All vendors'},
  ];
  const [show, setShow] = useState(false);
  const ref = useRef();
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setShow(true); obs.disconnect(); }
    }, {threshold:0.2});
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <section id="context-windows" className="wrap">
      <div className="eyebrow">The Multiplier</div>
      <h2 className="h2">Context windows grew 125x in three years.<br/><em>Trust in AI output didn't.</em></h2>
      <p className="lead">In early 2023, frontier models processed 8K tokens. By 2026, 1M tokens is standard across all major vendors, doubling every 2.4 months<sup><a href="#s16">[16]</a></sup>. AI can now consume vast amounts of information in a single query. But the real bottleneck was never consumption. It's trust. Users need to know that agent outputs are grounded in real, verified, up-to-date content with zero hallucinations. Larger context windows make this possible, but only if the data feeding them is trustworthy, fresh, and sourced from the live web.</p>
      <div ref={ref} className="cw-timeline">
        {bars.map((b,i) => (
          <div key={i} className="cw-bar">
            <div className="cw-bar-lbl">{b.size}</div>
            <div className="cw-bar-fill" style={{height: show ? `${b.h*2.5}px` : '4px', transitionDelay:`${i*80}ms`}} />
            <div className="cw-bar-yr">{b.yr}</div>
            <div className="cw-bar-model">{b.model}</div>
          </div>
        ))}
      </div>
      <div className="cw-kpi-grid">
        <div className="cw-kpi">
          <div className="cw-kpi-n"><em>1M</em> tokens</div>
          <div className="cw-kpi-d">~750K words per query. The capacity exists. Filling it with verified, real-time content is what makes agents trustworthy.</div>
        </div>
        <div className="cw-kpi">
          <div className="cw-kpi-n"><em>7,851%</em></div>
          <div className="cw-kpi-d">year-over-year growth in AI agent web traffic. Bots now outpace humans online.<sup><a href="#s30">[30]</a></sup></div>
        </div>
        <div className="cw-kpi">
          <div className="cw-kpi-n"><em>300%</em></div>
          <div className="cw-kpi-d">year-over-year surge in AI scraper traffic across the web<sup><a href="#s22">[22]</a></sup></div>
        </div>
        <div className="cw-kpi">
          <div className="cw-kpi-n"><em>72%</em></div>
          <div className="cw-kpi-d">of DIY scraping attempts fail due to anti-bot protections at production scale<sup><a href="#s24">[24]</a></sup></div>
        </div>
      </div>
    </section>
  );
}
